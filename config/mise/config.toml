# github releases
"github:99designs/aws-vault" = "latest"
"github:denisidoro/navi"     = "latest"
"github:eza-community/eza"   = "latest"
"github:googleworkspace/cli" = "latest"
"github:k1LoW/mo"            = "latest"
"github:miya10kei/ccargus"   = "latest"
"github:miya10kei/ccjanus"   = "latest"
"github:rtk-ai/rtk"          = "latest"

# npm packages
"npm:@anthropic-ai/sandbox-runtime" = "latest"
"npm:pnpm"                          = "latest"

# language servers (npm)
"npm:@angular/language-server"            = "latest"
"npm:@microsoft/compose-language-service" = "latest"
"npm:bash-language-server"                = "latest"
"npm:pyright"                             = "latest"
"npm:typescript"                          = "latest"
"npm:typescript-language-server"          = "latest"
"npm:vscode-langservers-extracted"        = "latest"
"npm:yaml-language-server"                = "latest"

# language servers (aqua / go)
# haskell-language-server: prebuilt バイナリは GHC ABI 整合性問題で動作しないため
# ghcup 経由で別途インストール（[tasks.install-hls] 参照）
"aqua:artempyanykh/marksman"                                             = "latest"
"aqua:hashicorp/terraform-ls"                                            = "latest"
"aqua:LuaLS/lua-language-server"                                         = "latest"
"aqua:rust-lang/rust-analyzer"                                           = "latest"
"aqua:tamasfe/taplo"                                                     = "latest"
"go:github.com/docker/docker-language-server/cmd/docker-language-server" = "latest"
"go:golang.org/x/tools/gopls"                                            = "latest"

# linters / formatters
"aqua:aquasecurity/trivy"   = "latest"
"aqua:astral-sh/ruff"       = "latest"
"aqua:google/yamlfmt"       = "latest"
"aqua:hadolint/hadolint"    = "latest"
"aqua:JohnnyMorganz/StyLua" = "latest"
"npm:markdownlint-cli2"     = "latest"
"npm:prettier"              = "latest"

# pipx packages
"pipx:aws-sam-cli"     = "latest"
"pipx:git-filter-repo" = "latest"
"pipx:markitdown"      = { version = "latest", extras = "all" }
"pipx:pgcli"           = "latest"

# vfox packages
"vfox:gcloud" = "latest"

# http downloads
"http:fzf-completion"   = { version = "master", url = "https://raw.githubusercontent.com/junegunn/fzf/master/shell/completion.zsh" }
"http:fzf-key-bindings" = { version = "master", url = "https://raw.githubusercontent.com/junegunn/fzf/master/shell/key-bindings.zsh" }
"http:fzf-tmux"         = { version = "master", url = "https://raw.githubusercontent.com/junegunn/fzf/master/bin/fzf-tmux" }

# cargo packages
"cargo:kotlin-lsp" = "latest"

[settings]
experimental                        = true
idiomatic_version_file_enable_tools = ["bun", "deno", "go", "java", "node", "python", "rust", "terraform"]
install_before                      = "7d"
not_found_auto_install              = true
trusted_config_paths                = ["~/dev"]

[settings.hook_env]
chpwd_only = true

[settings.node]
corepack = true

[settings.python]
uv_venv_auto = true

[tasks.install-bins]
depends = [
  "install-claude-code",
  "install-coderabbit",
  "install-gh-extensions",
  "install-hls",
  "install-session-manager",
]
description = "Install all script-based tools"

[tasks.install-hls]
description = "Install Haskell Language Server via ghcup"
run         = "ghcup install hls --set"

[tasks.install-gh-extensions]
description = "Install GitHub CLI extensions"
run         = "gh extension install dlvhdr/gh-dash"

[tasks.install-claude-code]
description = "Install Claude Code CLI"
run         = "curl -fsSL https://claude.ai/install.sh | bash"

[tasks.install-coderabbit]
description = "Install CodeRabbit CLI"
run         = "curl -fsSL https://cli.coderabbit.ai/install.sh | sh"

[tasks."kotlin-lsp:extract-sources"]
description = "kotlin-lspの依存ソースを~/.local/share/kotlin-lsp/sources/に抽出"
run         = "python3 ~/.local/share/kotlin-lsp/extract-sources.py --output ~/.local/share/kotlin-lsp/sources"
