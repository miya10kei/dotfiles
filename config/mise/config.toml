kotlin      = "latest"
lua         = "latest"
neovim      = "latest"
node        = "lts"
python      = ["3.14", "3.13", "3.11"]
rust        = "latest"
tbls        = "latest"
terraform   = "latest"
tree-sitter = "latest"

# Haskell toolchain
