"aqua:tamasfe/taplo" = "latest"
"go:github.com/docker/docker-language-server/cmd/docker-language-server" = "latest"
"go:golang.org/x/tools/gopls" = "latest"

# linters / formatters
"aqua:aquasecurity/trivy" = "latest"
"aqua:astral-sh/ruff" = "latest"
"aqua:google/yamlfmt" = "latest"
"aqua:hadolint/hadolint" = "latest"
"aqua:JohnnyMorganz/StyLua" = "latest"
"aqua:pinterest/ktlint" = "latest"
"npm:markdownlint-cli2" = "latest"
"npm:prettier" = "latest"

# pipx packages
"pipx:aws-sam-cli" = "latest"
"pipx:git-filter-repo" = "latest"
"pipx:pgcli" = "latest"

# vfox packages
"vfox:gcloud" = "latest"

# http downloads
"http:fzf-completion" = { version = "latest", version_list_url = "https://api.github.com/repos/junegunn/fzf/releases", version_json_path = ".[].tag_name", url = "https://raw.githubusercontent.com/junegunn/fzf/v{{version}}/shell/completion.zsh" }
"http:fzf-key-bindings" = { version = "latest", version_list_url = "https://api.github.com/repos/junegunn/fzf/releases", version_json_path = ".[].tag_name", url = "https://raw.githubusercontent.com/junegunn/fzf/v{{version}}/shell/key-bindings.zsh" }
"http:fzf-tmux" = { version = "latest", version_list_url = "https://api.github.com/repos/junegunn/fzf/releases", version_json_path = ".[].tag_name", url = "https://raw.githubusercontent.com/junegunn/fzf/v{{version}}/bin/fzf-tmux" }

# cargo packages
"cargo:kotlin-lsp" = "latest"

[settings]
experimental = true
idiomatic_version_file_enable_tools = [
  "deno",
  "go",
  "java",
  "node",
  "python",
  "rust",
  "terraform",
]
not_found_auto_install = false
trusted_config_paths = ["~/dev"]

[settings.hook_env]
chpwd_only = true

[settings.node]
corepack = true

[settings.python]
uv_venv_auto = true

[tasks.install-claude-code]
description = "Install Claude Code CLI"
run = "curl -fsSL https://claude.ai/install.sh | bash"

[tasks.install-coderabbit]
description = "Install CodeRabbit CLI"
run = "curl -fsSL https://cli.coderabbit.ai/install.sh | sh"

[tasks.install-gh-extensions]
description = "Install GitHub CLI extensions"
run = "gh extension install dlvhdr/gh-dash"

[tasks.install-bins]
description = "Install all script-based tools"
depends = [
  "install-claude-code",
  "install-coderabbit",
  "install-gh-extensions",
  "install-session-manager",
]

[tasks.install-plugins]
description = "Install neovim plugins via lazy.nvim"
run = "nvim --headless -c 'Lazy sync' -c 'qa'"

[tasks.install-treesitter-pkg]
description = "Install tree-sitter parsers"
run = "nvim --headless -c 'lua require(\"lazy\").load({plugins={\"nvim-treesitter\"}})' -c 'TSInstallNeeded' -c 'qa'"

[tasks.setup-nvim]
description = "Setup neovim plugins and treesitter parsers"
depends = ["install-plugins", "install-treesitter-pkg"]

[tasks.slim]
description = "Remove docs/man/caches from mise installs to slim the tree"
run = '''
#!/usr/bin/env bash
set -euo pipefail
INSTALLS="${MISE_DATA_DIR:-$HOME/.local/share/mise}/installs"
rm -rf \
    "${MISE_DATA_DIR:-$HOME/.local/share/mise}/downloads" \
    "$HOME/.cache" \
    "$INSTALLS"/*/*/{share/man,share/doc,man,doc} \
    "$INSTALLS"/vfox-gcloud/*/{platform/ext-runtime,deb,rpm,RELEASE_NOTES,README} \
    "$INSTALLS"/java/*/jmods
'''
